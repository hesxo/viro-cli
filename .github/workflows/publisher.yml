# Publishes to npm when you push a version tag: v1.2.3
#
# Setup (one-time):
# 1. npmjs.com → Access Tokens → Generate New Token → "Automation" (classic) or granular publish
# 2. GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#    Name: NPM_TOKEN   Value: <the token>
#
# Release:
#   Bump "version" in package.json, commit, then tag and push, e.g.:
#   git tag v4.0.6 && git push origin v4.0.6
#
# Optional: re-enable --provenance after configuring "Trusted publishers" on npm for this repo.

name: viro-cli

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Show pnpm version
        run: pnpm -v

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Show package name + version
        run: |
          node -e "const j=JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log(j.name+'@'+j.version)"

      - name: Fail if version already exists on npm
        run: |
          NAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).name)")
          VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already exists on npm. Bump version and push a new tag."
            exit 1
          fi
          echo "$NAME@$VER not found on npm. Continuing."

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
