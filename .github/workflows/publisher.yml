# Publish @hesxo/viro-cli to npm when you push a version tag (e.g. v4.0.6).
#
# Prerequisites:
# 1. npmjs.com → Access Tokens → create an "Automation" (classic) token with publish rights
# 2. GitHub → Settings → Secrets and variables → Actions → New repository secret:
#    Name: NPM_TOKEN   Value: <paste token>
#
# Release flow:
# 1. Bump "version" in package.json and commit
# 2. Tag must match version: if version is 4.0.7, tag must be exactly v4.0.7
#    git tag v4.0.7 && git push origin v4.0.7

name: viro-cli

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require NPM_TOKEN secret
        env:
          TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::Repository secret NPM_TOKEN is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Match git tag to package.json version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_VER="${TAG_NAME#v}"
          PKG_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          echo "Tag: $TAG_NAME → version $TAG_VER | package.json: $PKG_VER"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag version '$TAG_VER' must equal package.json version '$PKG_VER'. Bump package.json or fix the tag."
            exit 1
          fi

      - name: Show package identity
        run: |
          node -e "const j=JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('Publishing', j.name + '@' + j.version)"

      - name: Verify npm auth (token)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Skip if version already on npm
        id: exists
        run: |
          NAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).name)")
          VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VER is already on npm — skipping publish (idempotent)."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VER not on npm yet — will publish."
          fi

      - name: Publish to npm
        if: steps.exists.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks
